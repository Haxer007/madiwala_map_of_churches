        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #f43f5e;
            --bg-color: #0f172a;
            --card-bg: #1e293b;

        body,

        .timerBox {

            50% {

            }

            100% {

            display: none;

            left: 0;
            top: 0;

            height: 100%;

            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;

            max-width: 500px;

            from {
                transform: translateY(-50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;

        .modal-header h2 {
            margin: 0;
            font-size: 1.8rem;
        }

        .close-btn {
            background: none !important;
            border: none !important;
            font-size: 1.5rem;
            cursor: pointer;
            color: #94a3b8;
            padding: 0 !important;
        }

        .close-btn:hover {
            color: white;
            background: none !important;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            background: var(--bg-color);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .setting-row label {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .setting-row input,
        .setting-row select {
            width: 120px;
            padding: 8px;
            border-radius: 6px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);

            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            box-sizing: border-box;
        }

        /* --- TUG OF WAR VISUALS --- */
        .tug-container {
            width: 100%;
            max-width: 900px;
            position: relative;
            margin: 80px 0 140px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #rope {
            width: 100%;
            height: 18px;
            background: linear-gradient(90deg, #8B4513, #c28b45, #8B4513);
            border-radius: 10px;
            position: relative;
            overflow: visible;
        }

        /* Middle mark */
        #rope::after {
            content: '';
            position: absolute;
            left: 50%;
            top: -10px;
            transform: translateX(-50%);
            width: 4px;
            height: 36px;
            background: #cbd5e1;
            border-radius: 2px;
        }

        /* The Pulling Flag */
        #rope::before {
            content: '🚩';
            position: absolute;
            left: calc(50% + var(--offset, 0px));
            top: -38px;
            font-size: 32px;
            transition: left 0.5s ease;
        }

        .avatars-row {
            display: flex;
            justify-content: space-between;
            width: 110%;
            position: absolute;
            top: -140px;
        }

        .ground-platform {
            display: none;
        }

        /* --- CHARACTER SVG STYLES --- */
        .character-svg {
            width: 140px;
            height: 180px;
            transition: transform 0.3s ease;
            position: relative;
            z-index: 2;
        }

        /* Character Animations */
        .idle {
            animation: idleSway 3s infinite ease-in-out;
        }

        .pulling-left {
            animation: pullLeft 0.6s ease;
        }

        .pulling-right {
            animation: pullRight 0.6s ease;
        }

        .stunned {
            animation: shake 0.4s infinite;
            filter: grayscale(1) contrast(0.5);
        }

        @keyframes idleSway {

            0%,
            100% {
                transform: translateY(0) rotate(0);
            }

            50% {
                transform: translateY(-5px) rotate(1deg);
            }
        }

        @keyframes pullLeft {
            0% {
                transform: translateX(0)
            }

            50% {
                transform: translateX(-25px) rotate(-6deg)
            }

            100% {
                transform: translateX(0)
            }
        }

        @keyframes pullRight {
            0% {
                transform: translateX(0)
            }

            50% {
                transform: translateX(25px) rotate(6deg)
            }

            100% {
                transform: translateX(0)
            }
        }

        @keyframes shake {
            0% {
                transform: translate(1px, 1px) rotate(0deg);
            }

            20% {
                transform: translate(-1px, -2px) rotate(-1deg);
            }

            40% {
                transform: translate(-3px, 0px) rotate(1deg);
            }

            60% {
                transform: translate(3px, 2px) rotate(0deg);
            }

            80% {
                transform: translate(1px, -1px) rotate(1deg);
            }

            100% {
                transform: translate(-1px, 2px) rotate(-1deg);
            }
        }

        /* --------------------------------------------------------------
           SOUND EFFECTS ENGINE (Web Audio API)
           -------------------------------------------------------------- */
        const SoundFX = {
            ctx: null,
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
            },
            playOscillator(freq, type, duration, vol = 0.1, slideFreq = null) {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.connect(gain);
                gain.connect(this.ctx.destination);

                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                if (slideFreq) {
                    osc.frequency.exponentialRampToValueAtTime(slideFreq, this.ctx.currentTime + duration);
                }

                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);

                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            },
            ding() {
                this.init();
                this.playOscillator(880, 'sine', 0.5, 0.2);       // A5
                setTimeout(() => this.playOscillator(1108.73, 'sine', 0.8, 0.2), 100); // C#6
            },
            buzz() {
                this.init();
                this.playOscillator(150, 'sawtooth', 0.5, 0.2, 50);

            tug() {

        /* --------------------------------------------------------------

           -------------------------------------------------------------- */
        function newMatchId() {
            return 'm_' + Math.random().toString(36).substr(2, 9);

        /* --------------------------------------------------------------

           -------------------------------------------------------------- */
        function logDebug(msg) {
            console.log(msg);
            const d = document.getElementById('debug');
            if (d) {
                const div = document.createElement('div');
                div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
                d.appendChild(div);
                d.scrollTop = d.scrollHeight;

        /* --------------------------------------------------------------
           SET VIEW (projector / red / blue)
           -------------------------------------------------------------- */
        function setView(mode) {
            viewMode = mode;
            if (mode === 'red') playerTeam = 0;
            if (mode === 'blue') playerTeam = 1;

            // URL Sync: Ensure MATCH and ROLE are in the URL
            const params = new URLSearchParams(window.location.search);
            matchId = params.get('MATCH') || params.get('MATCH_ID');

            if (!matchId) {
                matchId = localStorage.getItem('matchId') || newMatchId();
                localStorage.setItem('matchId', matchId);
                params.set('MATCH', matchId);
            } else {
                // Standardize on MATCH parameter
                params.set('MATCH', matchId);
            }

            params.set('ROLE', mode);
            window.history.replaceState({}, '', '?' + params.toString());

            // Hide the view selection once a mode is picked
            document.getElementById('viewSelectors').classList.add('hide');

            // Show admin buttons only on projector
            const resetBtn = document.getElementById('resetBtn');
            if (resetBtn) resetBtn.classList.toggle('hide', mode !== 'projector');
            const settingsBtn = document.getElementById('settingsBtn');
            if (settingsBtn) settingsBtn.classList.toggle('hide', mode !== 'projector');
            const leaderboardBtn = document.getElementById('leaderboardBtn');
            if (leaderboardBtn) leaderboardBtn.classList.toggle('hide', mode !== 'projector');

            initGame();
        }

        /* --------------------------------------------------------------
           MAIN ENTRY – runs once after the user clicks a view button
           -------------------------------------------------------------- */
        function initGame() {
            const gameDiv = document.getElementById('game');
            gameDiv.innerHTML = '';

            logDebug(`Initializing Match ${matchId} Questions...`);
            questionsRef = db.ref('questions');
            questionsRef.once('value').then(snap => {
                logDebug('Questions data received.');
                if (!snap.exists()) {
                    logDebug('No questions in DB. Seeding starter pack...');
                    questionsRef.set(STARTER_QUESTIONS).catch(e => logDebug(`!!! SEED ERROR: ${e.message}`));
                    allQuestions = STARTER_QUESTIONS;
                } else {
                    const val = snap.val();
                    let raw = Array.isArray(val) ? val : Object.values(val);

                    // MIGRATION: Ensure every question has an 'id'
                    let needsUpdate = false;
                    allQuestions = raw.map((q, i) => {
                        if (!q.id) {
                            needsUpdate = true;
                            return { ...q, id: `q${i}` };
                        }
                        return q;
                    });

                    if (needsUpdate) {
                        logDebug('Database questions missing IDs. Migrating...');
                        questionsRef.set(allQuestions).then(() => logDebug('Migration complete.'))
                            .catch(e => logDebug(`!!! MIGRATE ERROR: ${e.message}`));
                    }
                }

                if (allQuestions.length === 0) {
                    logDebug('Loaded 0 questions. Using local starter pack.');
                    allQuestions = STARTER_QUESTIONS;
                } else {
                    logDebug(`Loaded ${allQuestions.length} questions.`);
                }

                matchRef = db.ref('match/' + matchId);
                matchRef.once('value').then(snap => {
                    const exists = snap.exists();
                    logDebug(`Match exists: ${exists}`);
                    if (viewMode === 'projector') {
                        if (!exists || (snap.val() && snap.val().status === 'finished')) {
                            logDebug('Projector creating/resetting match...');
                            createMatch();

                        }
                    } else if (!exists) {
                        logDebug('Controller waiting for Projector to create match...');
                        gameDiv.innerHTML = '<div class="card"><h3>Looking for match...</h3><p>Ensure the Projector is open and ready.</p></div>';
                    }
                    joinMatch(matchId);
                }).catch(e => {
                    logDebug(`!!! MATCH READ ERROR: ${e.message}`);
                    if (e.message.includes('permission_denied')) {
                        alert('Firebase Error: Make sure your Database Rules are set to Public (true) for testing.');
                    }
                });
            }).catch(e => {
                logDebug(`!!! Q-READ ERROR: ${e.message}`);
            });

            // HEARTBEAT: Refresh UI for time-based events every 500ms
            setInterval(() => {

                if (lastKnownState && lastKnownState.question) {
                    const timerEl = document.querySelector('.timerBox');
                    if (timerEl) {
                        const limit = (lastKnownState.settings?.questionTimer || 15) * 1000;
                        const elapsed = Date.now() - questionStartTime;
                        const remain = Math.ceil((limit - elapsed) / 1000);

                        if (remain > 0) {
                            timerEl.innerHTML = `⏱ ${remain}s`;
                        } else {
                            timerEl.innerHTML = "⏰ ANSWER NOW!";
                            timerEl.classList.add('timerAlert');

                            if (!buzzerPlayed) {
                                SoundFX.buzz();
                                buzzerPlayed = true;
                            }
                        }
                    }
                }
                if (!lastKnownState) return;
                const now = Date.now();
                if (viewMode === 'projector') {
                    // Update animation classes without rebuilding the whole DOM
                    ['Red', 'Blue'].forEach((team, i) => {
                        const svgs = document.querySelectorAll('.avatars-row svg');
                        if (svgs[i]) {
                            let animClass = 'character-svg idle';
                            if (lastKnownState.stunned && now < lastKnownState.stunned[i]) {
                                animClass = 'character-svg stunned';
                            } else if (lastKnownState.lastAction && (now - lastKnownState.lastAction.time) < 600 && lastKnownState.lastAction.team === i && lastKnownState.lastAction.msg.includes('pulled')) {
                                animClass = i === 0 ? 'character-svg pulling-left' : 'character-svg pulling-right';
                            }
                            svgs[i].setAttribute('class', animClass);
                        }
                    });
                } else if (lastKnownState.status === 'active' && lastKnownState.question) {
                    // Controller heartbeat: tick stun timer and check buttons natively
                    const myStunned = lastKnownState.stunned ? lastKnownState.stunned[playerTeam] : 0;
                    const isStunned = now < myStunned;

                    const buttons = document.querySelectorAll('.answers button');
                    buttons.forEach(btn => btn.disabled = isStunned);

                    const timer = document.getElementById('stunTimerText');
                    if (isStunned) {
                        const remaining = Math.ceil((myStunned - now) / 1000);
                        if (timer) timer.innerHTML = `⚡ Stunned! Wait ${remaining}s`;
                    } else if (timer) {
                        timer.remove();
                    }
                }
            }, 500);

        }

        /* --------------------------------------------------------------
           CREATE A NEW MATCH IN THE DATABASE
           -------------------------------------------------------------- */
        function createMatch() {
            logDebug('Executing createMatch...');
            matchRef = db.ref('match/' + matchId);
            matchRef.set({
                status: 'waiting',
                rope: 0,
                stunned: [0, 0],
                usedIds: [],
                question: null,
                answers: { "0": null, "1": null }, // Explicit keys for team 0 and 1
                winner: null,
                lastAction: null,
                settings: {
                    gameMode: 'tug',
                    stunMs: SETTINGS.stunMs,
                    pullStrength: SETTINGS.pullStrength,
                    winThreshold: SETTINGS.winThreshold
                },
                teams: {
                    0: { name: '', score: 0, corrects: 0, wrongs: 0, gender: 'boy', shirt: SETTINGS.avatarColours[0] },
                    1: { name: '', score: 0, corrects: 0, wrongs: 0, gender: 'boy', shirt: SETTINGS.avatarColours[1] }
                }
            }).then(() => logDebug('Match created successfully.'))
                .catch(e => logDebug(`!!! MATCH CREATE ERROR: ${e.message}`));
        }

        function saveSettings() {
            const stunSec = parseInt(document.getElementById('setStun').value) || 0;
            const pullStr = parseInt(document.getElementById('setPull').value) || 12;
            const winThresh = parseInt(document.getElementById('setWin').value) || 100;
            const category = document.getElementById('setCategory').value;
            const timer = parseInt(document.getElementById('setTimer').value) || 15;

            matchRef.child('settings').update({
                stunMs: stunSec * 1000,
                pullStrength: pullStr,
                winThreshold: winThresh,
                category: category,
                questionTimer: timer
            }).then(() => {
                closeSettingsModal();
                logDebug('Settings saved and successfully applied across all clients.');
            }).catch(e => {
                alert('Error saving settings: ' + e.message);
            });
        }

        /* --------------------------------------------------------------
           JOIN AN EXISTING MATCH (called on every device)
           -------------------------------------------------------------- */
        function joinMatch(id) {
            logDebug(`Joining Match: ${id}`);
            matchRef = db.ref('match/' + id);
            matchRef.on('value', snap => {
                const state = snap.val();
                if (!state) {
                    logDebug('!!! JOIN ERROR: No data found at match path.');
                    return;
                }
                lastKnownState = state; // Update cache
                render(state);

                // --- NEW: Projector handles round processing centrally ---
                if (viewMode === 'projector' && state.status === 'active' && state.question) {
                    const a = state.answers || {};
                    if (a[0] !== null && a[0] !== undefined && a[1] !== null && a[1] !== undefined) {
                        // Prevent double processing by briefly modifying status locally or trusting Firebase transactions.
                        // For safe multi-client architecture, one host (projector) does the math.
                        if (!window.isProcessingRound) {
                            window.isProcessingRound = true;
                            processRound();
                            setTimeout(() => { window.isProcessingRound = false; }, 2000); // 2s debounce
                        }
                    }
                }
            });
        }

        /* --------------------------------------------------------------
           LOAD THE NEXT QUESTION – guarantees no repeats.
           -------------------------------------------------------------- */
        function loadNextQuestion() {
            questionStartTime = Date.now();
            buzzerPlayed = false;
            if (isLoadingQuestion) return;
            if (!allQuestions || allQuestions.length === 0) {
                logDebug('Questions not ready yet - reloading from starter pack');
                allQuestions = STARTER_QUESTIONS;
            }
            isLoadingQuestion = true;
            logDebug('Picking next question...');

            // Wait slightly to ensure DB state has settled (handles rapid join events)
            setTimeout(() => {
                matchRef.once('value').then(snap => {
                    const state = snap.val();
                    if (!state || state.status === 'finished') {
                        isLoadingQuestion = false;
                        return;
                    }

                    // Determine active question pool locally based on settings
                    const category = state.settings ? state.settings.category : 'starter';
                    let pool = STARTER_QUESTIONS;
                    if (category === 'genesis') pool = GENESIS_QUESTIONS;
                    else if (category === 'gospels') pool = GOSPELS_QUESTIONS;

                    // Ensure state.usedIds is an array
                    let used = state.usedIds;
                    if (!Array.isArray(used)) {
                        used = used ? Object.values(used) : [];
                    }
                    used = used.filter(id => id !== undefined && id !== null);

                    const remaining = pool.filter(q => q && q.id && !used.includes(q.id));

                    if (remaining.length === 0) {
                        logDebug(`All questions used for ${category}. Resetting pool.`);
                        matchRef.update({ usedIds: [] }).then(() => {
                            isLoadingQuestion = false;
                            buzzerPlayed = false;
                            loadNextQuestion();
                        }).catch(e => {
                            logDebug(`!!! RESET ERROR: ${e.message}`);
                            isLoadingQuestion = false;
                        });
                        return;
                    }

                    const next = remaining[Math.floor(Math.random() * remaining.length)];
                    if (!next || !next.id) {
                        logDebug('!!! ERROR: Failed to pick valid question.');
                        isLoadingQuestion = false;
                        return;
                    }

                    const newUsed = Array.from(new Set([...used, next.id]));

                    logDebug(`Selected: ${next.id}. Updating DB...`);
                    matchRef.update({
                        question: next,
                        usedIds: newUsed,
                        status: 'active',
                        answers: { "0": null, "1": null } // Explicit keys reset
                    }).then(() => {
                        logDebug('DB updated with new question.');
                        setTimeout(() => { isLoadingQuestion = false; }, 800); // Debounce
                    }).catch(e => {
                        logDebug(`!!! DB UPDATE ERROR: ${e.message}`);
                        isLoadingQuestion = false;
                    });
                }).catch(e => {
                    logDebug(`!!! LOAD Q ERROR: ${e.message}`);
                    isLoadingQuestion = false;
                });
            }, 500);
        }

        /* --------------------------------------------------------------
           HANDLE ANSWER SUBMISSION
           -------------------------------------------------------------- */
        function submitAnswer(idx) {
            matchRef.once('value').then(snap => {
                const state = snap.val();
                const now = Date.now();
                if (now < (state.stunned || [0, 0])[playerTeam]) return; // still stunned

                // Record the answer for this player
                const upd = {};
                upd[`answers/${playerTeam}`] = idx;
                logDebug(`Updating Firebase with answer ${idx} for team ${playerTeam}...`);
                matchRef.update(upd).then(() => {
                    logDebug(`Recorded answer ${idx} for team ${playerTeam}`);
                    // The Projector's joinMatch listener will handle processRound()
                }).catch(e => logDebug(`!!! UPDATE ANS ERROR: ${e.message}`));
            });
        }

        /* --------------------------------------------------------------
           PROCESS ROUND – Calculates results for both teams at once
           -------------------------------------------------------------- */
        function processRound() {
            logDebug('Processing ROUND results...');
            matchRef.once('value').then(snap => {
                const state = snap.val();
                if (!state || !state.question) return;

                const correctIdx = state.question.c;
                const ans0 = state.answers[0];
                const ans1 = state.answers[1];
                const now = Date.now();
                const matchSettings = state.settings || SETTINGS;

                const upd = {
                    lastAction: {
                        time: firebase.database.ServerValue.TIMESTAMP,
                        msg: 'Round Complete!'
                    },
                    stunned: [...(state.stunned || [0, 0])],
                    rope: state.rope || 0,
                    teams: { ...state.teams }
                };

                // Process Team 0
                if (ans0 === correctIdx) {
                    upd.rope -= matchSettings.pullStrength;
                    upd.teams[0].score = (upd.teams[0].score || 0) + 1;
                    upd.teams[0].corrects = (upd.teams[0].corrects || 0) + 1;
                    SoundFX.tug();
                } else {
                    upd.stunned[0] = now + matchSettings.stunMs;
                    upd.teams[0].wrongs = (upd.teams[0].wrongs || 0) + 1;
                }

                // Process Team 1
                if (ans1 === correctIdx) {
                    upd.rope += matchSettings.pullStrength;
                    upd.teams[1].score = (upd.teams[1].score || 0) + 1;
                    upd.teams[1].corrects = (upd.teams[1].corrects || 0) + 1;
                    SoundFX.tug();
                } else {
                    upd.stunned[1] = now + matchSettings.stunMs;
                    upd.teams[1].wrongs = (upd.teams[1].wrongs || 0) + 1;
                }

                // Check win condition
                const winThresh = matchSettings.winThreshold || 100;
                if (matchSettings.gameMode === 'race') {
                    const p0 = (upd.teams[0].score || 0) * (matchSettings.pullStrength || 12);
                    const p1 = (upd.teams[1].score || 0) * (matchSettings.pullStrength || 12);
                    if (p0 >= winThresh || p1 >= winThresh) {
                        if (p0 === p1) {
                            upd.winner = 0; // Tie breaker goes to Red for simplicity if both cross at exact same time with same score
                        } else {
                            upd.winner = p0 > p1 ? 0 : 1;
                        }
                        upd.status = 'finished';
                    }
                } else {
                    if (Math.abs(upd.rope) >= winThresh) {
                        upd.winner = upd.rope > 0 ? 1 : 0;
                        upd.status = 'finished';
                    }
                }

                // NEW: Save to global leaderboard on game finish
                if (upd.status === 'finished') {
                    const winningTeam = upd.teams[upd.winner];
                    if (winningTeam && winningTeam.name) {
                        db.ref('leaderboard').push({
                            name: winningTeam.name,
                            score: winningTeam.score || 0,
                            date: firebase.database.ServerValue.TIMESTAMP
                        }).catch(e => logDebug(`!!! LEADERBOARD EXCEPTION: ${e.message}`));
                    }
                }

                // Reset answers for next question load
                upd.answers = { 0: null, 1: null };

                matchRef.update(upd).then(() => {
                    if (upd.status !== 'finished') {
                        loadNextQuestion();
                    }
                });
            });
        }

        /* --------------------------------------------------------------
           RESET MATCH – only visible on projector view
           -------------------------------------------------------------- */
        function resetMatch() {
            if (confirm('Reset the match? This will return everyone to the lobby.')) {
                createMatch();
            }
        }

        /* --------------------------------------------------------------
           RENDER UI BASED ON CURRENT STATE & VIEW
           -------------------------------------------------------------- */
        /* --- SVG TEMPLATES --- */
        function getAvatarSVG(gender, shirtColor, extraClass = '') {
            const hue = SETTINGS.avatarColours.indexOf(shirtColor) * 60;
            const filterId = `hue-shift-${Math.random().toString(36).substr(2, 5)}`;

            if (gender === 'boy') {
                return `
                <svg class="character-svg ${extraClass}" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">

                  <!-- Hair -->

                  <!-- Eyes -->
                  <circle cx="43" cy="28" r="2" fill="#000"/>
                  <circle cx="57" cy="28" r="2" fill="#000"/>
                  <!-- Smile -->
                  <path d="M45 38 Q50 42 55 38" stroke="#000" fill="transparent" stroke-width="1.5"/>
                  <!-- Shirt -->
                  <rect x="30" y="50" width="40" height="50" rx="10" fill="${shirtColor}"/>
                  <!-- Arms -->
                  <path d="M30 55 L15 80" stroke="#ffdbac" stroke-width="8" stroke-linecap="round"/>

                <svg class="character-svg ${extraClass}" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
                  <!-- Head -->
                  <circle cx="50" cy="30" r="20" fill="#ffdbac"/>
                  <!-- Hair -->
                  <path d="M25 30 Q25 5 50 5 Q75 5 75 30 L80 60 Q50 55 20 60 Z" fill="#4b2c20"/>
                  <!-- Eyes -->
                  <circle cx="43" cy="28" r="2" fill="#000"/>
                  <circle cx="57" cy="28" r="2" fill="#000"/>
                  <!-- Smile -->
                  <path d="M45 38 Q50 42 55 38" stroke="#000" fill="transparent" stroke-width="1.5"/>
                  <!-- Shirt -->
                  <path d="M30 50 L70 50 L75 100 L25 100 Z" fill="${shirtColor}"/>
                  <!-- Arms -->
                  <path d="M30 55 L15 80" stroke="#ffdbac" stroke-width="8" stroke-linecap="round"/>
                  <path d="M70 55 L85 80" stroke="#ffdbac" stroke-width="8" stroke-linecap="round"/>
                </svg>`;
            }
        }

        function render(state) {
            const gameDiv = document.getElementById('game');
            const timerDiv = document.createElement('div');
            timerDiv.className = 'timerBox';

            // PREVENT DESTRUCTIVE RENDER WHILE TYPING NAME
            if (viewMode !== 'projector') {
                const my = state.teams[playerTeam];
                if (!my || !my.name) {
                    if (document.getElementById('setupForm')) return; // Do not interrupt typing!
                }
            }

            gameDiv.innerHTML = '';
            const now = Date.now();
            // logDebug(`Rendering... now=${now}`); // Uncomment for heavy debugging

            // ---------- PROJECTOR ----------
            if (viewMode === 'projector') {
                const title = document.createElement('h2');
                title.textContent = '🏆 Bible Tug‑of‑War';
                gameDiv.appendChild(title);

                if (state.status === 'waiting') {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <h2>⚙️ Match Setup</h2>
                        <div style="display:flex; justify-content:space-around; margin:20px 0; font-size:1.2rem;">
                            <div>🔴 Red: ${state.teams[0].name ? '✅ Ready (' + state.teams[0].name + ')' : '⏳ Joining...'}</div>
                            <div>🔵 Blue: ${state.teams[1].name ? '✅ Ready (' + state.teams[1].name + ')' : '⏳ Joining...'}</div>
                        </div>
                        <div style="background:var(--bg-color); padding:20px; border-radius:8px; margin-top:20px; text-align:left;">
                            <div class="setting-row" style="margin-bottom:10px; border:none; padding:0;">
                                <label>🎮 Game Mode:</label>
                                <select id="setupMode" style="width:180px; padding:5px; border-radius:4px;">
                                    <option value="tug" ${state.settings.gameMode === 'tug' ? 'selected' : ''}>🪢 Tug of War</option>
                                    <option value="race" ${state.settings.gameMode === 'race' ? 'selected' : ''}>🏁 Race to Center</option>
                                </select>
                            </div>
                            <div class="setting-row" style="margin-bottom:10px; border:none; padding:0;">
                                <label>🏆 Points to Win:</label>
                                <input id="setupWin" type="number" value="${state.settings.winThreshold / (SETTINGS.pullStrength || 12)}" min="1" max="50" style="width:80px; padding:5px; border-radius:4px; text-align:center;">
                            </div>
                            <div class="setting-row" style="margin-bottom:0px; border:none; padding:0;">
                                <label>📚 Questions:</label>
                                <select id="setupCat" style="width:180px; padding:5px; border-radius:4px;">
                                    <option value="starter" ${state.settings.category === 'starter' ? 'selected' : ''}>Starter Pack</option>
                                    <option value="genesis" ${state.settings.category === 'genesis' ? 'selected' : ''}>Genesis</option>
                                    <option value="gospels" ${state.settings.category === 'gospels' ? 'selected' : ''}>The Gospels</option>
                                </select>
                            
                        </div>
                        <button id="startMatchBtn" class="save-settings-btn" style="margin-top:20px; font-size:1.5rem; padding: 20px;">▶ Start Match</button>
                    `;
                    gameDiv.appendChild(card);
                    const base = window.location.origin + window.location.pathname;

                    const redLink = `${base}?MATCH=${matchId}&ROLE=red`;
                    const blueLink = `${base}?MATCH=${matchId}&ROLE=blue`;

                    const qrDiv = document.createElement('div');
                    qrDiv.style.display = "flex";
                    qrDiv.style.justifyContent = "space-around";
                    qrDiv.style.marginTop = "20px";

                    qrDiv.innerHTML = `
                                    <div>
                                    <p>🔴 Red Team</p>
                                    <div id="qrRed"></div>
                                    </div>
                                    <div>
                                    <p>🔵 Blue Team</p>
                                    <div id="qrBlue"></div>
                                    </div>
                                    `;

                    card.appendChild(qrDiv);

                    new QRCode(document.getElementById("qrRed"), redLink);
                    new QRCode(document.getElementById("qrBlue"), blueLink);

                    const share = document.createElement('button');
                    share.textContent = "📤 Share Join Links";
                    share.onclick = () => {
                        navigator.clipboard.writeText(
                            `Red Team: ${redLink}\nBlue Team: ${blueLink}`
                        );
                        alert("Links copied!");
                    };
                    card.appendChild(share);
                    document.getElementById('startMatchBtn').onclick = () => {
                        const mode = document.getElementById('setupMode').value;
                        const wins = parseInt(document.getElementById('setupWin').value) || 5;
                        const cat = document.getElementById('setupCat').value;

                        matchRef.update({
                            status: 'active',
                            'settings/gameMode': mode,
                            'settings/winThreshold': wins * SETTINGS.pullStrength,
                            'settings/category': cat
                        }).then(() => loadNextQuestion());
                    };

                    // Live-sync setup input so it doesn't revert if a player joins midway
                    ['setupMode', 'setupWin', 'setupCat'].forEach(id => {
                        const el = document.getElementById(id);
                        if (el) {
                            el.addEventListener('change', (e) => {
                                let val = e.target.value;
                                if (id === 'setupWin') matchRef.update({ 'settings/winThreshold': (parseInt(val) || 5) * SETTINGS.pullStrength });
                                if (id === 'setupMode') matchRef.update({ 'settings/gameMode': val });
                                if (id === 'setupCat') matchRef.update({ 'settings/category': val });
                            });
                        }
                    });

                    return;
                }

                // Self-healing: if active but no question, load one
                if (state.status === 'active' && !state.question && state.winner == null) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <h3>Loading Next Question...</h3>
                        <p>Hang tight, picking a good one!</p>
                        <button onclick="loadNextQuestion()" style="margin-top:20px;">Force Load Question</button>
                    `;
                    gameDiv.appendChild(card);

                    if (!isLoadingQuestion) loadNextQuestion();
                    return;
                }

                const tugContainer = document.createElement('div');
                tugContainer.className = 'tug-container';

                // Avatars Row
                const avatars = document.createElement('div');
                avatars.className = 'avatars-row';
                const mode = (state.settings && state.settings.gameMode) || 'tug';

                ['Red', 'Blue'].forEach((team, i) => {
                    const avContainer = document.createElement('div');
                    avContainer.style.textAlign = 'center';

                    if (mode === 'race') {
                        // Calculate percentage of winThreshold reached
                        const winThresh = state.settings.winThreshold || 100;
                        const pullStr = state.settings.pullStrength || 12;
                        const progress = Math.min(100, Math.floor(((state.teams[i].score || 0) * pullStr) / winThresh * 100));
                        avContainer.style.transition = 'transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
                        // Max pixel movement to center is about 380px out of 900px wide tug-container
                        const maxDist = 380;
                        const pxMove = (progress / 100) * maxDist;
                        avContainer.style.transform = `translateX(${i === 0 ? pxMove : -pxMove}px)`;
                    }

                    const gender = (state.teams[i].gender || 'boy');
                    const shirt = (state.teams[i].shirt || SETTINGS.avatarColours[i === 0 ? 0 : 1]);

                    // Determine animation class
                    let animClass = 'idle';
                    if (state.stunned && now < state.stunned[i]) {
                        animClass = 'stunned';
                    } else if (state.lastAction && (now - state.lastAction.time) < 600 && state.lastAction.team === i && state.lastAction.msg.includes('pulled')) {
                        animClass = i === 0 ? 'pulling-left' : 'pulling-right';
                    }

                    avContainer.innerHTML = getAvatarSVG(gender, shirt, animClass);

                    // Show answer status icon
                    const ansValue = state.answers ? state.answers[i] : null;
                    const hasAnswered = ansValue !== null && ansValue !== undefined;
                    const statusIcon = document.createElement('div');
                    statusIcon.style.fontSize = '24px';
                    statusIcon.style.marginTop = '5px';
                    statusIcon.textContent = hasAnswered ? '✅' : '⏳';
                    avContainer.appendChild(statusIcon);

                    const name = document.createElement('div');
                    name.textContent = state.teams[i].name || (team + ' Team');
                    name.style.marginTop = '5px';
                    name.style.fontWeight = '700';
                    avContainer.appendChild(name);
                    avatars.appendChild(avContainer);
                });
                tugContainer.appendChild(avatars);

                // Rope
                const ropeDiv = document.createElement('div');
                ropeDiv.id = 'rope';
                if (mode === 'race') {
                    // Center flag stays still in race mode
                    ropeDiv.style.setProperty('--offset', '0px');
                } else {
                    ropeDiv.style.setProperty('--offset', (state.rope || 0) + 'px');
                }
                tugContainer.appendChild(ropeDiv);

                gameDiv.appendChild(tugContainer);

                // Question Card
                if (state.question && state.winner == null) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `<div class="question">${state.question.q}</div>`;
                    gameDiv.appendChild(card);
                }

                // Win Screen
                if (state.status === 'finished' && state.winner !== null) {
                    if (!window.winSoundPlayed) {
                        SoundFX.fanfare();
                        window.winSoundPlayed = true;
                    }
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <h2>${state.winner === 0 ? '🔴 Red Team' : '🔵 Blue Team'} - ${state.teams[state.winner].name} Wins!</h2>
                        <div class="leaderboard">
                          <table class="leaderboard-table">
                            <thead><tr><th>Team</th><th>Score</th></tr></thead>
                            <tbody>
                              ${Object.entries(state.teams).map(([k, v]) => `
                                <tr><td>${v.name}</td><td>${v.score || 0}</td></tr>
                              `).join('')}
                            </tbody>
                          </table>
                        </div>
                    `;
                    gameDiv.appendChild(card);
                }
                return;
            }

            // ---------- CONTROLLERS ----------
            const opponentIdx = playerTeam === 0 ? 1 : 0;
            const opp = state.teams[opponentIdx];
            const my = state.teams[playerTeam];

            if (!my || !my.name) {
                const card = document.createElement('div');
                card.className = 'card';
                card.id = 'setupForm';
                card.innerHTML = `
                    <h3>Setup Your Team</h3>
                    <div class="setup-form">
                        <select id="genderSel">
                            <option value="boy">👦 Boy</option>
                            <option value="girl">👧 Girl</option>
                        </select>
                        <select id="colorSel">
                            ${SETTINGS.avatarColours.map(c => `<option value="${c}" style="background:${c}">${c}</option>`).join('')}
                        </select>
                        <input id="nameInp" placeholder="Enter Team Name"/>
                        <button id="saveBtn">Join Match</button>
                    </div>
                `;
                gameDiv.appendChild(card);
                document.getElementById('saveBtn').onclick = () => {
                    const gender = document.getElementById('genderSel').value;
                    const shirt = document.getElementById('colorSel').value;
                    const name = document.getElementById('nameInp').value || (viewMode === 'red' ? 'Red' : 'Blue');

                    const upd = {};
                    upd[`teams/${playerTeam}/gender`] = gender;
                    upd[`teams/${playerTeam}/shirt`] = shirt;
                    upd[`teams/${playerTeam}/name`] = name;

                    // Only update my team. The host decides when to start via the "Start Match" button.
                    matchRef.update(upd);
                };
                return;
            }

            // Game Action View
            const actionCard = document.createElement('div');
            actionCard.className = 'card';
            actionCard.appendChild(timerDiv);

            // Default status to 'waiting' if missing
            const status = state.status || 'waiting';

            if (status === 'waiting') {
                actionCard.innerHTML = `
                    <h3>Waiting for Players...</h3>
                    <p>Get ready, ${my.name}!</p>
                    <div style="margin-top:20px; font-size:0.9rem; border-top:1px solid var(--glass-border); padding-top:10px;">
                        Opponent Status: ${opp.name ? '✅ Ready' : '⏳ Joining...'}
                    </div>
                `;
            } else if (status === 'active' && state.question && state.winner == null) {
                const qDiv = document.createElement('div');
                qDiv.className = 'question';
                qDiv.textContent = state.question.q;
                actionCard.appendChild(qDiv);

                const ansDiv = document.createElement('div');
                ansDiv.className = 'answers';

                const ansValue = state.answers ? state.answers[playerTeam] : null;
                const hasAnswered = ansValue !== null && ansValue !== undefined;

                if (hasAnswered) {
                    if (!window[`soundPlayed_${state.question.id}_${playerTeam}`]) {
                        SoundFX.ding(); // positive ping for answering
                        window[`soundPlayed_${state.question.id}_${playerTeam}`] = true;
                    }
                    const msg = document.createElement('div');
                    msg.style.gridColumn = '1 / span 2';
                    msg.style.padding = '20px';
                    msg.style.fontSize = '1.2rem';
                    msg.style.fontWeight = '700';
                    msg.style.color = 'var(--secondary)';
                    msg.innerHTML = '✅ Answer Submitted!<br><small>Waiting for opponent...</small>';
                    ansDiv.appendChild(msg);
                } else {
                    state.question.a.forEach((opt, i) => {
                        const btn = document.createElement('button');
                        btn.textContent = opt;
                        const disabled = now < (state.stunned || [0, 0])[playerTeam];
                        btn.disabled = disabled;
                        btn.onclick = () => submitAnswer(i);
                        ansDiv.appendChild(btn);
                    });
                }
                actionCard.appendChild(ansDiv);

                if (state.stunned && now < state.stunned[playerTeam]) {
                    if (!window[`stunSound_${state.question.id}_${playerTeam}`]) {
                        SoundFX.buzz();
                        window[`stunSound_${state.question.id}_${playerTeam}`] = true;
                    }
                    const remaining = Math.ceil((state.stunned[playerTeam] - now) / 1000);
                    const timer = document.createElement('div');
                    timer.className = 'stun-timer';
                    timer.id = 'stunTimerText';
                    timer.innerHTML = `⚡ Stunned! Wait ${remaining}s`;
                    actionCard.appendChild(timer);
                }

                // Activity Log and Stats
                const statsDiv = document.createElement('div');
                statsDiv.className = 'stats-panel';
                statsDiv.innerHTML = `
                    <div class="stat-item">
                        <span class="stat-label">Opponent (${opp.name})</span>
                        <div class="stat-value">✅${opp.corrects || 0} | ❌${opp.wrongs || 0}</div>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Your Strength</span>
                        <div class="stat-value">💪 ${my.corrects || 0}</div>
                    </div>
                `;
                actionCard.appendChild(statsDiv);

                const logDiv = document.createElement('div');
                logDiv.className = 'activity-log';
                if (state.lastAction && (now - state.lastAction.time) < 3000) {
                    logDiv.textContent = state.lastAction.msg;
                }
                actionCard.appendChild(logDiv);

            } else if (status === 'finished') {
                actionCard.innerHTML = `<h2>${state.winner === playerTeam ? '🏁 You Won!' : '💀 You Lost!'}</h2>`;
            } else {
                actionCard.innerHTML = `
                    <h3>Waiting for Game to Start...</h3>
                    <p>The projector should pick a question soon.</p>
                    <button onclick="loadNextQuestion()" style="margin-top:10px;">Manually Load Question</button>
                `;
                // Controller self-healing logic: if match is active but no question, attempt to load one
                if (status === 'active' && !state.question && !isLoadingQuestion) {
                    logDebug('Active match missing question. Attempting auto-load...');
                    setTimeout(() => loadNextQuestion(), 1000);
                }
            }
            gameDiv.appendChild(actionCard);
        }

        /* --------------------------------------------------------------
           STARTUP – Check URL for Role & MATCH
           -------------------------------------------------------------- */
        function checkURL() {
            const params = new URLSearchParams(window.location.search);
            const role = params.get('ROLE');
            if (role) {
                setView(role);
            }
        }
        checkURL();

        window.addEventListener('online', () => { location.reload(); });
        window.addEventListener('offline', () => { alert('You are offline.'); });


        // OVERRIDE NATIVE CONFIRM
        window.confirm = function (message) {

            return new Promise(resolve => {

                const modal = document.getElementById("globalConfirmModal");
                const msg = document.getElementById("confirmMessage");

                msg.textContent = message;

                modal.classList.add("active");

                const yes = document.getElementById("confirmYesBtn");
                const no = document.getElementById("confirmNoBtn");

                function cleanup() {
                    modal.classList.remove("active");
                    yes.onclick = null;
                    no.onclick = null;
                }

                yes.onclick = () => {
                    cleanup();
                    resolve(true);
                };

                no.onclick = () => {
                    cleanup();
                    resolve(false);
                };

            });

        };
    </script>
    <!-- GLOBAL CONFIRM MODAL -->
    <div id="globalConfirmModal" class="modal">
        <div class="modal-content" style="max-width:420px;text-align:center">

            <h2 id="confirmTitle">Confirm</h2>
            <p id="confirmMessage">Are you sure?</p>

            <div style="margin-top:20px;display:flex;gap:15px;justify-content:center">

                <button id="confirmYesBtn"
                    style="background:#f43f5e;border:none;color:white;padding:10px 20px;border-radius:8px;cursor:pointer">
                    Yes
                </button>

                <button id="confirmNoBtn"
                    style="background:#334155;border:none;color:white;padding:10px 20px;border-radius:8px;cursor:pointer">
                    Cancel
                </button>

            </div>

        </div>
    </div>
