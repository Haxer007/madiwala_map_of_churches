
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telugu Lyrics Transliterator</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width:1000px;
    margin:20px auto;
    padding:20px;
    background:#f5f5f5;
}

textarea{
    width:100%;
    height:250px;
    font-size:18px;
    padding:10px;
}

button{
    padding:10px 20px;
    margin-top:10px;
    margin-right:10px;
    cursor:pointer;
}

#output{
    margin-top:20px;
    background:white;
    padding:20px;
    border-radius:8px;
}

.telugu{
    font-size:20px;
    font-weight:bold;
    margin-top:10px;
}

.english{
    color:#0b5394;
    margin-bottom:10px;
}

.copy-msg{
    color:green;
    margin-left:10px;
}
</style>
</head>
<body>

<h2>Telugu → English Lyrics Transliteration</h2>

<textarea id="input" placeholder="Paste Telugu lyrics here"></textarea>

<br>

<button onclick="transliterateText()">Transliterate</button>
<button onclick="copyResult()">Copy Result</button>

<span id="copyMsg" class="copy-msg"></span>

<div id="output"></div>

<script>

const vowels = {
    "అ":"a",
    "ఆ":"aa",
    "ఇ":"i",
    "ఈ":"ee",
    "ఉ":"u",
    "ఊ":"oo",
    "ఋ":"ru",
    "ఎ":"e",
    "ఏ":"ee",
    "ఐ":"ai",
    "ఒ":"o",
    "ఓ":"oo",
    "ఔ":"au"
};

const vowelSigns = {
    "ా":"aa",
    "ి":"i",
    "ీ":"ee",
    "ు":"u",
    "ూ":"oo",
    "ృ":"ru",
    "ె":"e",
    "ే":"ee",
    "ై":"ai",
    "ొ":"o",
    "ో":"oo",
    "ౌ":"au"
};

const consonants = {
    "క":"ka","ఖ":"kha","గ":"ga","ఘ":"gha","ఙ":"nga",
    "చ":"cha","ఛ":"chha","జ":"ja","ఝ":"jha","ఞ":"nya",
    "ట":"ta","ఠ":"tha","డ":"da","ఢ":"dha","ణ":"na",
    "త":"tha","థ":"tha","ద":"da","ధ":"dha","న":"na",
    "ప":"pa","ఫ":"pha","బ":"ba","భ":"bha","మ":"ma",
    "య":"ya","ర":"ra","ల":"la","వ":"va",
    "శ":"sha","ష":"sha","స":"sa","హ":"ha",
    "ళ":"la","క్ష":"ksha","ఱ":"ra"
};

function transliterateTelugu(text){

    let result = "";

    for(let i=0;i<text.length;i++){

        let ch = text[i];
        let next = text[i+1];

        if(vowels[ch]){
            result += vowels[ch];
            continue;
        }

        if(consonants[ch]){

            let base = consonants[ch];

            if(next === "్"){
                result += base.slice(0,-1);
                i++;
                continue;
            }

            if(next && vowelSigns[next]){
                result += base.slice(0,-1) + vowelSigns[next];
                i++;
                continue;
            }

            result += base;
            continue;
        }

        if(ch==="ం"){
            result+="m";
            continue;
        }

        if(ch==="ః"){
            result+="h";
            continue;
        }

        result+=ch;
    }

    return beautify(result);
}

function beautify(text){

    return text
        // anusvara combinations
        .replace(/md/g, "nd")
        .replace(/mb/g, "mb")
        .replace(/mg/g, "ng")
        .replace(/mk/g, "nk")
        .replace(/mch/g, "nch")
        .replace(/mj/g, "nj")
        .replace(/mth/g, "nth")
        .replace(/mdh/g, "ndh")
        .replace(/md/g, "nd")
        .replace(/mt/g, "nt")
        .replace(/mch/g, "nch")
        .replace(/mj/g, "nj")
        .replace(/mg/g, "ng")
        .replace(/mk/g, "nk")

        .replace(/\byesu\b/gi,"Yesu")
        .replace(/\byesuni\b/gi,"Yesuni")
        .replace(/\bkreestesu\b/gi,"Kreesthesu")
        .replace(/\bhallelooya\b/gi,"Hallelooya")
        .replace(/\baamen\b/gi,"Aamen")

        .replace(/\b\w/g,c=>c.toUpperCase());
}

function transliterateText(){

    const input = document.getElementById("input").value;

    const lines = input.split("\n");

    let html = "";

    for(const line of lines){

        if(line.trim()===""){
            html += "<br>";
            continue;
        }

        const english = transliterateTelugu(line);

        html += `
            <div class="telugu">${escapeHtml(line)}</div>
            <div class="english">${escapeHtml(english)}</div>
        `;
    }

    document.getElementById("output").innerHTML = html;
}

function copyResult(){

    const output = document.getElementById("output");

    let text = "";

    output.querySelectorAll(".telugu,.english").forEach(el=>{
        text += el.innerText + "\n";
    });

    navigator.clipboard.writeText(text);

    document.getElementById("copyMsg").innerText="Copied!";

    setTimeout(()=>{
        document.getElementById("copyMsg").innerText="";
    },2000);
}

function escapeHtml(text){
    const div=document.createElement("div");
    div.textContent=text;
    return div.innerHTML;
}

</script>

</body>
</html>
