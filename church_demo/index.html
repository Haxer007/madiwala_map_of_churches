:"Get Directions",openMaps:"Open Maps",mainChurch:"Main Church",sundayVenue:"Sunday Venue",hosaRoadBranch:"Hosa Road Branch",annPrayer:"🙏 Prayer Night",annYouth:"⚡ Youth Alive",annWomen:"🌸 Women of Faith",annRevival:"🔥 Revival Fire",annChristmas:"🎄 Christmas",minHealingName:"Healing Service",minHealingDesc:"Our Lord is a miracle-working God. Every Sunday a dedicated healing meeting is held where many receive miracles.",minHealingTime:"⏰ Every Sunday · 7:30 PM",minFastingName:"Fasting Prayer",minFastingDesc:"Fasting prayer to help people overcome barriers. As Esther's story shows — prayer can break any barrier.",minFastingTime:"⏰ Every Saturday · 10 AM – 12 PM",minBibleName:"Bible Study",minBibleDesc:"Well-trained and certified scholars teach the truth on Google Meet. We help people think, question, and grow.",minBibleTime:"⏰ Every Wednesday · 7 PM (Online)",minKidsName:"Kids Bible Club",minKidsDesc:"Fun-filled program with games, puppet shows, fancy dress competitions, and moral value teaching for children.",minKidsTime:"⏰ Every Sunday · 5 PM",minTeensName:"Teens Fellowship",minTeensDesc:"Equipping teens to face spiritual, school, and life challenges with trained professional spiritual teachers.",minTeensTime:"⏰ Every Saturday · 7 PM",minYouthName:"Youth Fellowship",minYouthDesc:"Fun-filled activities, mentorship, and Bible teaching to help youth overcome everyday life barriers.",minYouthTime:"⏰ Every Saturday · 7 PM",minWomenName:"Women's Fellowship",minWomenDesc:"A safe space for women to vent, support each other spiritually, and uphold one another in prayer.",minWomenTime:"⏰ Regular Gatherings",minPromiseName:"Promise Prayers",minPromiseDesc:"Begin each month in God's presence. The promise word of the month is shared through the man of God.",minPromiseTime:"⏰ Every Month 1st Day · 5 AM"},ta:{welcomesYou:"உங்களை வரவேற்கிறது",changeLangToast:"மெனுவிலிருந்து மொழியை எப்போது வேண்டுமானாலும் மாற்றலாம்.",navHome:"முகப்பு",navAnnouncements:"அறிவிப்புகள்",navAbout:"எங்களை
